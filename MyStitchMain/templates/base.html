<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Site{% endblock %}</title>
    {% block extra_head %}{% endblock %}
</head>
<body>

    <nav>
        <p>nav bar</p>
    </nav>

    <main>
        <!-- Child templates will inject their unique content right here -->
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>footer</p>
    </footer>

</body>
</html>
